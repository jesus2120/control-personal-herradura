<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Personal - Sitio La Herradura</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 15px;
        }
        h2 { color: #1a73e8; margin: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #34a853;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #2d8e47; }
        #mensaje {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            color: #1a73e8;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.png" alt="Logo La Herradura" class="logo" onerror="this.style.display='none'">
        <h2>Control de Personal</h2>
        <p>Sitio La Herradura</p>
    </div>

    <div class="form-group">
        <label>Nombre del Operador:</label>
        <input type="text" id="nombre" placeholder="Ej. Juan Pérez">
    </div>
    <div class="form-group">
        <label>No. de Gafete:</label>
        <input type="text" id="gafete" placeholder="000">
    </div>
    <div class="form-group">
        <label>Vencimiento de Gafete:</label>
        <input type="date" id="vencimiento">
    </div>
    <div class="form-group">
        <label>Beneficiario:</label>
        <input type="text" id="beneficiario" placeholder="Nombre completo">
    </div>
    <div class="form-group">
        <label>Parentesco:</label>
        <input type="text" id="parentesco" placeholder="Ej. Esposa, Hijo">
    </div>

    <button onclick="guardarOperador()">GUARDAR OPERADOR</button>
    
    <div id="mensaje"></div>
</div>

<script>
    async function guardarOperador() {
        const datos = {
            nombre: document.getElementById('nombre').value,
            gafete: document.getElementById('gafete').value,
            vencimiento: document.getElementById('vencimiento').value,
            beneficiario: document.getElementById('beneficiario').value,
            parentesco: document.getElementById('parentesco').value
        };

        const msgDiv = document.getElementById('mensaje');
        msgDiv.innerText = "Guardando...";

        try {
            const respuesta = await fetch('/api/operadores', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });

            if (respuesta.ok) {
                msgDiv.innerText = "✅ ¡Guardado en la nube con éxito!";
                // Limpiar formulario
                document.querySelectorAll('input').forEach(i => i.value = '');
            } else {
                msgDiv.innerText = "❌ Error al guardar";
            }
        } catch (error) {
            msgDiv.innerText = "❌ No hay conexión con el servidor";
        }
    }
</script>

</body>
</html>
