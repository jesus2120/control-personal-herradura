<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA LA HERRADURA</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { width: 1050px; margin: auto; background: #080808; border: 1px solid #1a1a1a; padding: 30px; border-radius: 12px; }
        .top-bar { display: flex; gap: 8px; margin-bottom: 20px; }
        .btn-nav { flex: 1; padding: 12px 5px; font-size: 11px; font-weight: bold; text-transform: uppercase; cursor: pointer; border-radius: 4px; border: 1px solid #d4af37; background: #d4af37; color: #000; transition: 0.3s; }
        .btn-nav:hover { background: #fff; box-shadow: 0 0 10px #d4af37; }
        .btn-admin { display: none; }
        .btn-sec { background: #222; color: #fff; border-color: #444; }
        .search-box { background: #111; padding: 15px; border-radius: 8px; display: flex; gap: 15px; margin-bottom: 20px; border: 1px solid #222; }
        label { color: #d4af37; font-size: 10px; font-weight: bold; display: block; margin-bottom: 4px; }
        input, select { background: #000; border: 1px solid #333; color: #fff; padding: 10px; width: 100%; box-sizing: border-box; font-size: 14px; border-radius: 4px; }
        .edit-active { border: 1px solid #d4af37 !important; box-shadow: 0 0 10px rgba(212,175,55,0.5); }
        #display_area { display: none; }
        .ficha-grid { display: grid; grid-template-columns: 180px 1fr 1fr; gap: 20px; background: #0a0a0a; padding: 20px; border: 1px solid #1a1a1a; }
        .foto-frame { width: 180px; height: 220px; border: 2px solid #d4af37; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; }
        .foto-frame img { width: 100%; height: 100%; object-fit: cover; }
        .sensitive-data { display: none; margin-top: 20px; border-top: 1px solid #d4af37; padding-top: 20px; }
        .beneficiarios-grid { display: grid; grid-template-columns: 3fr 1fr; gap: 10px; margin-top: 10px; }
        #modal_auditoria { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; }
        .modal-content { width: 950px; margin: 40px auto; background: #0f0f0f; border: 1px solid #d4af37; padding: 30px; border-radius: 8px; }
        .filter-bar { display: flex; gap: 15px; background: #1a1a1a; padding: 15px; border-radius: 5px; margin-bottom: 20px; align-items: flex-end; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; color: #fff; }
        th { background: #d4af37; color: #000; padding: 12px; text-align: left; }
        td { border-bottom: 1px solid #222; padding: 10px; font-size: 13px; }
        .resaltado { color: #d4af37; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align:center; margin-bottom:15px;"><img src="logo.png" style="max-height:70px;" alt="LOGO"></div>

    <div class="search-box">
        <div style="width:20%"><label>ECONÓMICO</label><input type="text" id="s_eco" class="enter-nav"></div>
        <div style="width:80%"><label>BUSCAR NOMBRE</label><input type="text" id="s_nom" class="enter-nav"></div>
    </div>

    <div class="top-bar">
        <button class="btn-nav" onclick="buscar()">Consultar</button>
        <button class="btn-nav btn-sec" onclick="location.reload()">Limpiar / Salir</button>
        <button id="btn_login" class="btn-nav btn-sec" onclick="accesoAdmin()">Login Admin</button>
        <button class="btn-nav btn-sec" onclick="abrirPanelAuditoria()">Auditoría</button>
        <button class="btn-nav btn-admin" style="background:#27ae60; color:#fff;" onclick="prepararAlta()">Alta</button>
        <button id="btn_edit" class="btn-nav btn-admin" onclick="habilitarEdicion()">Editar</button>
        <button id="btn_save" class="btn-nav btn-admin" style="background:#fff; color:#000; display:none;" onclick="guardar()">Grabar</button>
    </div>

    <div id="display_area">
        <div class="ficha-grid">
            <div class="foto-frame">
                <img id="p_foto" src="" style="display:none;"><span id="p_sin">SIN FOTO</span>
            </div>
            <div>
                <label>NOMBRE COMPLETO</label><input type="text" id="i_nom" class="enter-nav" disabled>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <div style="flex:1;"><label>ECONÓMICO</label><input type="text" id="i_eco" class="enter-nav" disabled></div>
                    <div style="flex:1;"><label>TELÉFONO</label><input type="text" id="i_tel" class="enter-nav" disabled></div>
                </div>
            </div>
            <div>
                <label>VENC. LICENCIA</label><input type="date" id="i_vlic" class="enter-nav" disabled>
                <label style="margin-top:10px;">VENC. SEGURO</label><input type="date" id="i_vseg" class="enter-nav" disabled>
                <label style="margin-top:10px;">CONTACTO EMERGENCIA</label><input type="text" id="i_enom" class="enter-nav" disabled>
                <label style="margin-top:10px;">TEL. EMERGENCIA</label><input type="text" id="i_etel" class="enter-nav" disabled>
            </div>
        </div>

        <div class="sensitive-data" id="admin_fields">
            <label>DOMICILIO PARTICULAR</label><input type="text" id="i_dom" class="enter-nav" disabled>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:10px;">
                <div><label>N° LICENCIA</label><input type="text" id="i_nlic" class="enter-nav" disabled></div>
                <div><label>PÓLIZA DE SEGURO</label><input type="text" id="i_nseg" class="enter-nav" disabled></div>
            </div>
            
            <h4 style="color:#d4af37; margin: 20px 0 5px 0; border-bottom: 1px solid #333;">BENEFICIARIOS (EN CASO DE DEFUNCIÓN)</h4>
            <div class="beneficiarios-grid">
                <div><label>NOMBRE</label><input type="text" id="b1_n" class="enter-nav" disabled></div>
                <div><label>%</label><input type="text" id="b1_p" class="enter-nav" disabled></div>
                <div><input type="text" id="b2_n" class="enter-nav" disabled></div>
                <div><input type="text" id="b2_p" class="enter-nav" disabled></div>
                <div><input type="text" id="b3_n" class="enter-nav" disabled></div>
                <div><input type="text" id="b3_p" class="enter-nav" disabled></div>
                <div><input type="text" id="b4_n" class="enter-nav" disabled></div>
                <div><input type="text" id="b4_p" class="enter-nav" disabled></div>
            </div>

            <input type="file" id="f_input" style="display:none;">
            <button id="f_btn" class="btn-nav btn-sec" style="margin-top:15px; display:none;" onclick="document.getElementById('f_input').click()">Cambiar Foto</button>
            <input type="hidden" id="i_foto_base64">
        </div>
    </div>
</div>

<div id="modal_auditoria">
    <div class="modal-content">
        <h2 style="color:#d4af37;">AUDITORÍA SELECTIVA</h2>
        <div class="filter-bar">
            <div style="flex:2;"><label>TIPO</label>
                <select id="f_tipo">
                    <option value="licencia">LICENCIAS</option>
                    <option value="seguro">SEGUROS</option>
                    <option value="ambos">AMBOS</option>
                </select>
            </div>
            <div style="flex:1;"><label>MES</label>
                <select id="f_mes">
                    <option value="all">TODOS</option>
                    <option value="0">ENE</option><option value="1">FEB</option><option value="2">MAR</option><option value="3">ABR</option>
                    <option value="4">MAY</option><option value="5">JUN</option><option value="6">JUL</option><option value="7">AGO</option>
                    <option value="8">SEP</option><option value="9">OCT</option><option value="10">NOV</option><option value="11">DIC</option>
                </select>
            </div>
            <button class="btn-nav" onclick="ejecutarAuditoria()">GENERAR REPORTE</button>
        </div>
        <table id="tabla_auditoria">
            <thead><tr><th>Eco</th><th>Nombre</th><th>Venc. Licencia</th><th>Venc. Seguro</th><th>Teléfono</th></tr></thead>
            <tbody></tbody>
        </table>
        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:20px;">
            <button class="btn-nav btn-sec" onclick="document.getElementById('modal_auditoria').style.display='none'">REGRESAR A PANTALLA PRINCIPAL</button>
            <button class="btn-nav" onclick="window.print()">Imprimir</button>
        </div>
    </div>
</div>

<script>
    const URL_BASE = "http://127.0.0.1:3000";
    let isAdmin = false;
    let datosGlobales = [];

    // NAVEGACIÓN ENTER
    document.addEventListener('keydown', e => {
        if(e.key === 'Enter'){
            const inputs = Array.from(document.querySelectorAll('.enter-nav:not(:disabled)'));
            const idx = inputs.indexOf(document.activeElement);
            if(idx > -1 && idx < inputs.length - 1) { e.preventDefault(); inputs[idx+1].focus(); }
        }
    });

    function accesoAdmin() {
        if(prompt("Clave:") === "sitioherraduraz2") {
            isAdmin = true;
            document.querySelectorAll('.btn-admin').forEach(b => b.style.display = 'block');
            document.getElementById('btn_login').style.display = 'none';
        }
    }

    async function buscar() {
        const eco = document.getElementById('s_eco').value;
        if(!eco) return alert("Ingrese Económico");
        const res = await fetch(`${URL_BASE}/buscar?eco=${eco}`);
        const d = await res.json();
        if(d) {
            document.getElementById('i_nom').value = d.nombre || "";
            document.getElementById('i_eco').value = d.economico || "";
            document.getElementById('i_tel').value = d.telefono || "";
            document.getElementById('i_dom').value = d.domicilio || "";
            document.getElementById('i_vlic').value = d.venc_licencia || "";
            document.getElementById('i_vseg').value = d.venc_seguro || "";
            document.getElementById('i_enom').value = d.contacto || "";
            document.getElementById('i_etel').value = d.telefono_emergencia || "";
            document.getElementById('i_nlic').value = d.licencia || "";
            document.getElementById('i_nseg').value = d.seguro || "";
            // Beneficiarios
            document.getElementById('b1_n').value = d.b1_n || ""; document.getElementById('b1_p').value = d.b1_p || "";
            document.getElementById('b2_n').value = d.b2_n || ""; document.getElementById('b2_p').value = d.b2_p || "";
            document.getElementById('b3_n').value = d.b3_n || ""; document.getElementById('b3_p').value = d.b3_p || "";
            document.getElementById('b4_n').value = d.b4_n || ""; document.getElementById('b4_p').value = d.b4_p || "";
            
            if(d.foto) {
                document.getElementById('p_foto').src = d.foto;
                document.getElementById('p_foto').style.display = 'block';
                document.getElementById('p_sin').style.display = 'none';
                document.getElementById('i_foto_base64').value = d.foto;
            } else {
                document.getElementById('p_foto').style.display = 'none';
                document.getElementById('p_sin').style.display = 'block';
            }
            document.getElementById('admin_fields').style.display = isAdmin ? 'block' : 'none';
            document.getElementById('display_area').style.display = 'block';
        } else { alert("No encontrado"); }
    }

    function habilitarEdicion() {
        document.querySelectorAll('#display_area input').forEach(i => { i.disabled = false; i.classList.add('edit-active'); });
        document.getElementById('f_btn').style.display = 'block';
        document.getElementById('btn_edit').style.display = 'none';
        document.getElementById('btn_save').style.display = 'block';
    }

    function prepararAlta() {
        document.getElementById('display_area').style.display = 'block';
        document.getElementById('admin_fields').style.display = 'block';
        habilitarEdicion();
        document.querySelectorAll('#display_area input').forEach(i => i.value = "");
        document.getElementById('p_foto').style.display = 'none';
        document.getElementById('p_sin').style.display = 'block';
    }

    async function guardar() {
        const d = {
            nombre: document.getElementById('i_nom').value,
            economico: document.getElementById('i_eco').value,
            telefono: document.getElementById('i_tel').value,
            domicilio: document.getElementById('i_dom').value,
            venc_licencia: document.getElementById('i_vlic').value,
            venc_seguro: document.getElementById('i_vseg').value,
            contacto: document.getElementById('i_enom').value,
            telefono_emergencia: document.getElementById('i_etel').value,
            licencia: document.getElementById('i_nlic').value,
            seguro: document.getElementById('i_nseg').value,
            b1_n: document.getElementById('b1_n').value, b1_p: document.getElementById('b1_p').value,
            b2_n: document.getElementById('b2_n').value, b2_p: document.getElementById('b2_p').value,
            b3_n: document.getElementById('b3_n').value, b3_p: document.getElementById('b3_p').value,
            b4_n: document.getElementById('b4_n').value, b4_p: document.getElementById('b4_p').value,
            foto: document.getElementById('i_foto_base64').value
        };
        await fetch(`${URL_BASE}/guardar`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(d) });
        alert("DATOS GRABADOS");
        location.reload();
    }

    async function abrirPanelAuditoria() {
        const res = await fetch(`${URL_BASE}/buscar_todos`);
        datosGlobales = await res.json();
        document.getElementById('modal_auditoria').style.display = 'block';
    }

    function ejecutarAuditoria() {
        const tipo = document.getElementById('f_tipo').value;
        const mes = document.getElementById('f_mes').value;
        const tbody = document.querySelector("#tabla_auditoria tbody");
        tbody.innerHTML = "";

        let filtrados = datosGlobales.filter(d => {
            const fL = d.venc_licencia ? new Date(d.venc_licencia) : null;
            const fS = d.venc_seguro ? new Date(d.venc_seguro) : null;
            if (mes === "all") return true;
            const m = parseInt(mes);
            const mL = fL ? fL.getUTCMonth() : -1;
            const mS = fS ? fS.getUTCMonth() : -1;
            if (tipo === "licencia") return mL === m;
            if (tipo === "seguro") return mS === m;
            return mL === m || mS === m;
        });

        filtrados.sort((a,b) => {
            const dateA = tipo === "seguro" ? new Date(a.venc_seguro) : new Date(a.venc_licencia);
            const dateB = tipo === "seguro" ? new Date(b.venc_seguro) : new Date(b.venc_licencia);
            return dateA - dateB;
        });

        filtrados.forEach(d => {
            tbody.innerHTML += `<tr>
                <td>${d.economico}</td>
                <td>${d.nombre}</td>
                <td class="${tipo!=='seguro'?'resaltado':''}">${d.venc_licencia||'---'}</td>
                <td class="${tipo!=='licencia'?'resaltado':''}">${d.venc_seguro||'---'}</td>
                <td>${d.telefono||'---'}</td>
            </tr>`;
        });
    }

    document.getElementById('f_input').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(ev) {
            document.getElementById('i_foto_base64').value = ev.target.result;
            document.getElementById('p_foto').src = ev.target.result;
            document.getElementById('p_foto').style.display = 'block';
            document.getElementById('p_sin').style.display = 'none';
        };
        reader.readAsDataURL(e.target.files[0]);
    });
</script>
</body>
</html>
